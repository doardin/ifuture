spring:
    datasource:
        url: jdbc:mysql://localhost:8889/ifuture
        username: root
        password: root
    jpa:
        show-sql: false
        hibernate:
            ddl-auto: update
        properties:
            hibernate:
                dialect: org.hibernate.dialect.MySQL8Dialect
        generate-ddl: true
        open-in-view: false
server:
  port: 9000
  servlet:
    context-path: /ifuture